  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

" height=\"11\" rx=\"2\" ry=\"2\"><\u002Frect>\n        <path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- TAB V · Locked -->\n    <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:#090602; cursor:pointer; position:relative;\" style-active=\"background:#130e06;\" onclick=\"{{ onV }}\">\n      <span style=\"font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:#291a0f; line-height:1;\">V<\u002Fspan>\n      <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#221408\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\" ry=\"2\"><\u002Frect>\n        <path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n  <\u002Fnav>\n\n  <!-- ▌ CONTENT AREA ▌ -->\n  <div style=\"flex:1; min-width:0; display:flex; flex-direction:column; height:100dvh;\">\n\n    <!-- Header -->\n    <div style=\"flex-shrink:0; padding:calc(env(safe-area-inset-top,0px) + 13px) 18px 11px; background:linear-gradient(180deg,rgba(9,6,2,0.97) 65%,rgba(9,6,2,0.82)); border-bottom:1px solid #1c1408;\">\n      <div style=\"display:flex; align-items:center; gap:9px; margin-bottom:5px;\">\n        <div style=\"width:16px; height:1px; background:#3a2810;\"><\u002Fdiv>\n        <span style=\"font-size:8.5px; color:#5a3e1a; letter-spacing:0.3em; text-transform:uppercase; font-family:'Lora',serif;\">ΣΧΕΔΊΗ · I<\u002Fspan>\n        <div style=\"width:16px; height:1px; background:#3a2810;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'Playfair Display',serif; font-size:23px; font-weight:700; font-style:italic; color:#c9a96e; line-height:1.15; letter-spacing:-0.01em;\">Ti estì<\u002Fdiv>\n      <div style=\"font-size:10.5px; color:#6b4c22; letter-spacing:0.06em; margin-top:5px; font-family:'Lora',serif; font-style:italic;\">τί ἐστί — «che cos'è?»<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Scrollable body -->\n    <div style=\"flex:1; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; padding:22px 18px calc(48px + env(safe-area-inset-bottom,0px)) 18px;\">\n\n      <!-- ── SECTION 1 ── -->\n      <h2 style=\"font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:#e0c880; line-height:1.35; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid #1e1508; letter-spacing:0.02em;\">Curiosità e aneddoti su Socrate<\u002Fh2>\n\n      <h3 style=\"font-family:'Playfair Display',serif; font-size:13.5px; font-style:italic; font-weight:600; color:#c9a96e; margin-bottom:8px;\">Il suo aspetto fisico<\u002Fh3>\n      <p style=\"font-family:'Lora',serif; font-size:14.5px; line-height:1.8; color:#b8a878; margin-bottom:20px; text-wrap:pretty;\">Socrate era l'esatto opposto del classico ideale estetico greco. I testi dell'epoca (tra cui Platone) lo descrivono come decisamente brutto: occhi sporgenti e distanti, naso camuso (schiacciato e all'insù) e labbra spesse. Veniva spesso paragonato a un «sileno» (una figura mitologica a metà tra uomo e capra) o a una torpedine marina, perché con le sue domande spiazzanti «addormentava» e scioccava chiunque lo ascoltasse.<\u002Fp>\n\n      <h3 style=\"font-family:'Playfair Display',serif; font-size:13.5px; font-style:italic; font-weight:600; color:#c9a96e; margin-bottom:8px;\">La trance filosofica<\u002Fh3>\n      <p style=\"font-family:'Lora',serif; font-size:14.5px; line-height:1.8; color:#b8a878; margin-bottom:20px; text-wrap:pretty;\">Aveva una straordinaria capacità di concentrazione. Durante una campagna militare a Potidea, si racconta che si bloccò all'alba a riflettere su un problema logico. Rimase immobile nello stesso identico punto per un giorno e una notte intera, finché i soldati, incuriositi, portarono i loro giacigli fuori per vederlo e capire quando si sarebbe mosso. Sciolse la posizione solo all'alba successiva, fece una preghiera al Sole e se ne andò.<\u002Fp>\n\n      <h3 style=\"font-family:'Playfair Display',serif; font-size:13.5px; font-style:italic; font-weight:600; color:#c9a96e; margin-bottom:8px;\">Il rapporto con Santippe<\u002Fh3>\n      <p style=\"font-family:'Lora',serif; font-size:14.5px; line-height:1.8; color:#b8a878; margin-bottom:20px; text-wrap:pretty;\">Sua moglie, Santippe, è passata alla storia come lo stereotipo della donna bisbetica e irascibile. Un aneddoto famosissimo racconta che, dopo averlo insultato furiosamente senza ricevere risposta (Socrate la ignorava filosoficamente), lei gli svuotò un intero catino d'acqua sporca sulla testa. Socrate, bagnato fradicio, commentò calmo: «Sapevo che dopo tanto tuonare sarebbe arrivata la pioggia».<\u002Fp>\n\n      <h3 style=\"font-family:'Playfair Display',serif; font-size:13.5px; font-style:italic; font-weight:600; color:#c9a96e; margin-bottom:8px;\">A piedi scalzi e con lo stesso mantello<\u002Fh3>\n      <p style=\"font-family:'Lora',serif; font-size:14.5px; line-height:1.8; color:#b8a878; margin-bottom:26px; text-wrap:pretty;\">Non gli importava nulla dei beni materiali. Camminava per Atene sempre a piedi scalzi, sia d'estate che in pieno inverno (persino sul ghiaccio durante le guerre), e indossava sempre lo stesso mantello logoro. Quando andava al mercato, guardava le merci e diceva: «Quante cose ci sono di cui non ho bisogno!».<\u002Fp>\n\n      <!-- Decorative divider -->\n      <div style=\"display:flex; align-items:center; gap:10px; margin:4px 0 28px;\">\n        <div style=\"flex:1; height:1px; background:linear-gradient(90deg,transparent,#2a1f0e);\"><\u002Fdiv>\n        <span style=\"color:#c9a96e; font-size:11px; letter-spacing:0.65em; opacity:0.45; padding-right:0.65em;\">✦ ✦ ✦<\u002Fspan>\n        <div style=\"flex:1; height:1px; background:linear-gradient(90deg,#2a1f0e,transparent);\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ── SECTION 2 ── -->\n      <h2 style=\"font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:#e0c880; line-height:1.35; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #1e1508; letter-spacing:0.02em;\">I Greci facevano la «caccia al tesoro»?<\u002Fh2>\n\n      <p style=\"font-family:'Lora',serif; font-size:14.5px; line-height:1.8; color:#b8a878; margin-bottom:16px; text-wrap:pretty;\">Se per caccia al tesoro intendiamo il gioco moderno con una mappa, indovinelli in rima e un «forziere» nascosto, la risposta è no: non esiste traccia di un gioco simile strutturato in quel modo nell'antica Grecia.<\u002Fp>\n\n      <p style=\"font-family:'Lora',serif; font-size:14.5px; line-height:1.8; color:#b8a878; margin-bottom:24px; text-wrap:pretty;\">Tuttavia, i Greci (sia bambini che adulti) erano amanti dei giochi di ingegno, di squadra e di inseguimento che ne ricordano molto lo spirito.<\u002Fp>\n\n      <h3 style=\"font-family:'Playfair Display',serif; font-size:13.5px; font-style:italic; font-weight:600; color:#c9a96e; margin-bottom:16px;\">I giochi «simili» dell'epoca<\u002Fh3>\n\n      <div style=\"margin-bottom:20px; padding-left:15px; border-left:2px solid #2a1f0e;\">\n        <h4 style=\"font-family:'Playfair Display',serif; font-size:13px; font-weight:700; color:#dfc880; margin-bottom:7px; line-height:1.3;\">L'Ostrakinda · Il gioco dei cocci<\u002Fh4>\n        <p style=\"font-family:'Lora',serif; font-size:14px; line-height:1.78; color:#b0a070; text-wrap:pretty;\">Una via di mezzo tra il moderno «ce l'hai» e un gioco di strategia. Si dividevano in due squadre (il Giorno e la Notte). Si lanciava una conchiglia o un coccio colorato di bianco da un lato e di nero dall'altro. A seconda di come cadeva, una squadra doveva scappare e l'altra doveva rincorrerla e catturare tutti i componenti prima che raggiungessero una linea di sicurezza.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"margin-bottom:20px; padding-left:15px; border-left:2px solid #2a1f0e;\">\n        <h4 style=\"font-family:'Playfair Display',serif; font-size:13px; font-weight:700; color:#dfc880; margin-bottom:7px; line-height:1.3;\">La fuga e la ricerca<\u002Fh4>\n        <p style=\"font-family:'Lora',serif; font-size:14px; line-height:1.78; color:#b0a070; text-wrap:pretty;\">Esistevano varianti del nascondino (chiamato <span style=\"font-style:italic;\">apodidraskinda<\u002Fspan>) o giochi in cui si dovevano trovare oggetti nascosti, ma erano per lo più passatempi infantili.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"margin-bottom:32px; padding-left:15px; border-left:2px solid #2a1f0e;\">\n        <h4 style=\"font-family:'Playfair Display',serif; font-size:13px; font-weight:700; color:#dfc880; margin-bottom:7px; line-height:1.3;\">Gli indovinelli nei Simposi · I Griphi<\u002Fh4>\n        <p style=\"font-family:'Lora',serif; font-size:14px; line-height:1.78; color:#b0a070; text-wrap:pretty;\">Gli adulti non facevano cacce al tesoro fisiche, ma adoravano le «cacce al tesoro intellettuali». Durante i simposi (i banchetti), gli invitati si sfidavano a risolvere enigmi difficilissimi, giochi di parole e indovinelli mitologici (i <span style=\"font-style:italic;\">griphi<\u002Fspan>). Chi indovinava riceveva ghirlande, baci o dolci; chi sbagliava doveva bere tutto d'un fiato una coppa di vino salato.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Footer ornament -->\n      <div style=\"text-align:center; padding-bottom:8px;\">\n        <span style=\"font-family:'Playfair Display',serif; font-size:11px; color:#3a2810; letter-spacing:0.3em; font-style:italic;\">✦ finis sectionis primae ✦<\u002Fspan>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- ░░ LOCKED-TAB TOAST ░░ -->\n<sc-if value=\"{{ showToast }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed; left:80px; top:50%; transform:translateY(-50%); background:#120d06; border:1px solid rgba(201,169,110,0.32); border-radius:3px; padding:11px 16px; z-index:50; box-shadow:0 4px 28px rgba(0,0,0,0.85); pointer-events:none; max-width:210px; animation:toastIn 0.28s ease;\">\n    <div style=\"font-size:8.5px; color:#6b4c22; letter-spacing:0.28em; text-transform:uppercase; font-family:'Lora',serif; margin-bottom:5px;\">κεκλεισμένον<\u002Fdiv>\n    <div style=\"font-family:'Playfair Display',serif; font-size:13.5px; font-style:italic; color:#c9a96e; line-height:1.3;\">{{ toastName }}<\u002Fdiv>\n    <div style=\"font-size:10px; color:#4a3418; margin-top:4px; font-family:'Lora',serif;\">Questa scheda non è ancora accessibile.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { toast: null };\n  _timer = null;\n\n  tapLocked = (name) => {\n    if (this._timer) clearTimeout(this._timer);\n    this.setState({ toast: name });\n    this._timer = setTimeout(() => this.setState({ toast: null }), 2400);\n  };\n\n  componentWillUnmount() {\n    if (this._timer) clearTimeout(this._timer);\n  }\n\n  renderVals() {\n    return {\n      showToast: this.state.toast !== null,\n      toastName: this.state.toast || '',\n      onII:  () => this.tapLocked('Elenchos'),\n      onIII: () => this.tapLocked('Anagoghè'),\n      onIV:  () => this.tapLocked('Maieutikè tèchne'),\n      onV:   () => this.tapLocked('Aporìa kài kátharsis'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
